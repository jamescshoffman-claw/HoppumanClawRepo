<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- BMW Roundel - blue/white quadrants in circle, no text -->
  <circle cx="100" cy="100" r="98" fill="#1C3171" stroke="#888" stroke-width="0"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#C0C0C0" stroke-width="8"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#C0C0C0" stroke-width="4"/>
  <!-- White top-left and bottom-right quadrants -->
  <path d="M100,18 A82,82 0 0,0 18,100 L100,100 Z" fill="white"/>
  <path d="M100,182 A82,82 0 0,0 182,100 L100,100 Z" fill="white"/>
  <!-- Blue top-right and bottom-left quadrants -->
  <path d="M100,18 A82,82 0 0,1 182,100 L100,100 Z" fill="#1C3171"/>
  <path d="M100,182 A82,82 0 0,1 18,100 L100,100 Z" fill="#1C3171"/>
  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#999" stroke-width="6"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#999" stroke-width="3"/>
</svg>
