<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Rolex Crown - no text -->
  <g transform="translate(100,110)">
    <!-- Crown base -->
    <rect x="-55" y="20" width="110" height="22" rx="4" fill="#A67C00"/>
    <!-- Crown body -->
    <rect x="-45" y="-5" width="90" height="28" fill="#A67C00"/>
    <!-- Five crown points -->
    <!-- Center tall point -->
    <polygon points="0,-55 -14,0 14,0" fill="#A67C00"/>
    <!-- Left points -->
    <polygon points="-22,-42 -38,-5 -8,-5" fill="#A67C00"/>
    <polygon points="-50,-28 -60,0 -34,0" fill="#A67C00"/>
    <!-- Right points -->
    <polygon points="22,-42 8,-5 38,-5" fill="#A67C00"/>
    <polygon points="50,-28 34,0 60,0" fill="#A67C00"/>
    <!-- Crown pearls (circles on top of each point) -->
    <circle cx="0" cy="-57" r="7" fill="#A67C00"/>
    <circle cx="-22" cy="-44" r="6" fill="#A67C00"/>
    <circle cx="22" cy="-44" r="6" fill="#A67C00"/>
    <circle cx="-50" cy="-30" r="6" fill="#A67C00"/>
    <circle cx="50" cy="-30" r="6" fill="#A67C00"/>
  </g>
</svg>
